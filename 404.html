<!doctype html>
<html lang="cs">
<head>

<style>
  .not-found {
    min-height: 70vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: var(--space-10) var(--space-5);
  }

  .not-found p { margin: 0 auto var(--space-3); max-width: 38rem; }
  .not-found a { margin-top: var(--space-6); display: inline-block; }
</style>
</head>
<body>
<main id="main">
  <section class="not-found">
    <div>
      <h1>Tady to končí jako ta silnice za vsí.</h1>
      <p>Stránka, kterou hledáte, tady není. Možná jsem ji někam přesunul, možná jste překlepli URL.</p>
      <p><a class="btn btn--primary" href="/">Zpátky domů</a></p>
    </div>
  </section>
</main>
</body>
